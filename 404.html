<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost in Space — SpaceSparks</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<style>
  .notfound{
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:40px 24px; position:relative; z-index:1;
  }
  .notfound-code{
    font-family:var(--font-mono);
    color:var(--accent);
    font-size:1rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    margin-bottom:18px;
  }
  .notfound-title{
    font-family:var(--font-display);
    font-size:clamp(2.2rem, 6vw, 3.6rem);
    font-weight:500;
    margin:0 0 18px;
  }
  .notfound-title em{ font-style:italic; color:var(--accent); font-weight:400; }
  .notfound-text{
    color:var(--muted);
    max-width:480px;
    font-size:1.05rem;
    margin:0 0 36px;
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="nebula-glow nebula-1"></div>
<div class="nebula-glow nebula-2"></div>

<div class="notfound">
  <p class="notfound-code mono">404 — off the map</p>
  <h1 class="notfound-title">This page drifted <em>out of orbit</em>.</h1>
  <p class="notfound-text">
    Whatever you were looking for isn't here — maybe it moved, maybe the link was mistyped,
    or maybe it's just floating somewhere past the edge of this site.
  </p>
  <a href="/Space/" class="btn btn-primary">Back to Home</a>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let w, h;

    function resize(){
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      buildStars();
    }
    function buildStars(){
      const count = Math.floor((w * h) / 9000);
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.2 + 0.3,
        baseAlpha: Math.random() * 0.6 + 0.2,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        phase: Math.random() * Math.PI * 2,
      }));
    }
    function animate(){
      ctx.clearRect(0, 0, w, h);
      for (const s of stars){
        s.phase += s.twinkleSpeed;
        const alpha = s.baseAlpha * (0.6 + 0.4 * Math.sin(s.phase));
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      requestAnimationFrame(animate);
    }
    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(animate);
  });
</script>
</body>
</html>
